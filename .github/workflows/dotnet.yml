name: .NET build and test
env:
  CURRENT_VERSION: 3.0.${{ github.run_number }}
  LAST_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

on:
  push:
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
      - name: Check formatting
        run: dotnet format --verify-no-changes
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test on Ubuntu (no build)
        run: dotnet test --no-build --verbosity normal --configuration Release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: SanitizeFilename/bin/Release/
          retention-days: 1
      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts
          path: SanitizeFilenameTests/bin/Release/
          retention-days: 1

  test:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-artifacts
          path: SanitizeFilenameTests/bin/Release/
      - name: Test (no build)
        run: dotnet test --no-build --verbosity normal --configuration Release

  deployRelease:
    if: startsWith(github.ref, 'refs/heads/release')
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: SanitizeFilename/bin/Release/
      - name: NugetPush
        env:
          NUGET_TOKEN_EXISTS: ${{ secrets.NUGET_TOKEN }}
        if: env.NUGET_TOKEN_EXISTS != ''
        run: |
          dotnet nuget push ./SanitizeFilename/bin/Release/*.nupkg --skip-duplicate --api-key ${{secrets.NUGET_TOKEN}} --source https://api.nuget.org/v3/index.json
      - name: Github release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        if: env.GITHUB_TOKEN != ''
        run: |
          gh release create ${{env.CURRENT_VERSION}} ./SanitizeFilename/bin/Release/*.*nupkg --generate-notes

  deployTest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: SanitizeFilename/bin/Release/
      - name: NugetPush
        env:
          NUGET_TOKEN_EXISTS: ${{ secrets.NUGET_TEST_TOKEN }}
        if: env.NUGET_TOKEN_EXISTS != ''
        run: |
          ls ./SanitizeFilename/bin/Release
          dotnet nuget push ./SanitizeFilename/bin/Release/*.nupkg --skip-duplicate --api-key ${{secrets.NUGET_TEST_TOKEN}} --source https://apiint.nugettest.org/v3/index.json
